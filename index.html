<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
    font-family:Arial;
}

a{
    padding:15px 35px;
    font-size:18px;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

a:hover{
    background:#45a049;
    transform:scale(1.05);
}

a:active{
    transform:scale(0.95);
}

@media (max-width:600px){
    a{
        padding:12px 25px;
        font-size:16px;
    }
}
</style>
</head>

<body>

<a href="sam.html" target="_blank">Click Me</a>

</body>
</html>
